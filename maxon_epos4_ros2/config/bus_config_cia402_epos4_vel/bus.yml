options:
  dcf_path: "@BUS_CONFIG_PATH@"

master:
  node_id: 6
  driver: "ros2_canopen::MasterDriver"
  package: "canopen_master_driver"
  sync_period: 50000   # unit is us ; we slow down for test to 50ms
  boot_time: 10000   # ms ; over all boot time 
  boot_timeout: 1500   # ms ; boot time out 
defaults:
  driver: "ros2_canopen::Cia402Driver"
  package: "canopen_402_driver"
  period: 50   # unit is ms ; this is the cycle time of the PDO 0x201 sent by ros2_canopen
  boot_timeout_ms: 3000
  heartbeat_producer: 2000   # [ms] heartbeat producer for all slaves 
  #switching_state: 2
  scale_pos_to_dev: 1.0    # for testing we work in EPOS4 units [qc]
  scale_pos_from_dev: 1.0  # for testing we work in EPOS4 units [qc]
  scale_vel_to_dev: 1.0    # for testing we work in EPOS4 units [rpm]
  scale_vel_from_dev: 1.0  # for testing we work in EPOS4 units [rpm]
  sdo:
    - {index: 0x6040, sub_index: 0, value: 0x80} # Fault reset
    - {index: 0x6040, sub_index: 0, value: 0x06} # Fault reset
    - {index: 0x6040, sub_index: 0, value: 0x07} # Fault reset
    - {index: 0x60C2, sub_index: 1, value: 50} # Set interpolation time for cyclic modes to 50 ms
    - {index: 0x60C2, sub_index: 2, value: -3} # Set base 10-3s
    - {index: 0x6081, sub_index: 0, value: 1000}  # profile velocity
    - {index: 0x6083, sub_index: 0, value: 2000}  # profile acceleration
    - {index: 0x6098, sub_index: 0, value: 37}  # homing method for actual position
    - {index: 0x6060, sub_index: 0, value: 3}  # profile velocity mode
    #- {index: 0x6060, sub_index: 0, value: 8}  # CSP mode
  tpdo: # TPDO needed statusword, actual position
    1:
      enabled: true
      cob_id: "auto"
      transmission: 0x01
      mapping:
        - {index: 0x6041, sub_index: 0} # status word
        - {index: 0x6064, sub_index: 0} # position actual value
        - {index: 0x6061, sub_index: 0} # mode of OP display
        #- {index: 0x606C, sub_index: 0} # velocity actual value
    2:
      enabled: false
    3:
      enabled: false
    4:
      enabled: false
  rpdo: # RPDO needed controlword, target position, (target velocity) 
    1:
      enabled: true
      cob_id: "auto"
      transmission: 0x01
      mapping:
      - {index: 0x6040, sub_index: 0} # controlword
      - {index: 0x60FF, sub_index: 0} # target velocity
      - {index: 0x6060, sub_index: 0} # mode of Operation
    2:
      enabled: false
      #transmission: 0x00
    3:
      enabled: false
      #transmission: 0x00
    4:
      enabled: false
      #transmission: 0x00
nodes:
  cia402_device_1:
    node_id: 1
    dcf: "maxon_epos4_0x6050.eds"
    reset_communication: true
    namespace: "/"
